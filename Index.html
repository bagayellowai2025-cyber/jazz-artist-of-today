<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jazz Artist of Today</title>
  
  <!-- 引入字體：復古襯線體 (標題) 與 現代無襯線體 (內文) -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- 引入 Google Material 圖示 -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <!-- 引入 Tailwind CSS (快速排版工具) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script>
    let currentArtistId = ""; // 新增這行：用來記錄目前畫面上的人物 ID
    
    // 設定 Tailwind 的客製化主題 (復古金與字體)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            vintageGold: '#D4AF37',
            carbon: '#121212',
            cardBg: '#1E1E1E'
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Noto Sans TC"', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    /* 隱藏捲軸但保持可滾動 */
    ::-webkit-scrollbar { display: none; }
    body { -ms-overflow-style: none; scrollbar-width: none; }
    
    /* 圖片的漸層暗色遮罩 */
    .hero-gradient {
      background: linear-gradient(to top, #121212 10%, rgba(18, 18, 18, 0.4) 60%, rgba(18, 18, 18, 0.1) 100%);
    }
  </style>
</head>

<body class="bg-carbon text-gray-200 font-sans pb-24 relative min-h-screen">

  <!-- 載入中畫面 (Loading State) -->
  <div id="loading-screen" class="fixed inset-0 bg-carbon z-50 flex flex-col items-center justify-center">
    <span class="material-symbols-outlined animate-spin text-vintageGold text-5xl mb-4">album</span>
    <p class="text-vintageGold tracking-widest text-sm animate-pulse">Loading today's artist...</p>
  </div>

  <!-- 1. 頂部導覽列 -->
  <nav class="fixed top-0 w-full bg-carbon/90 backdrop-blur-md z-40 px-4 py-3 border-b border-gray-800 flex justify-between items-center">
    <div class="font-serif italic text-vintageGold text-lg font-semibold tracking-wide">Jazz Artist of Today</div>
    <div class="flex gap-4">
      <button class="text-gray-300 hover:text-vintageGold transition"><span class="material-symbols-outlined">auto_stories</span></button>
      <button class="text-gray-300 hover:text-vintageGold transition"><span class="material-symbols-outlined">account_circle</span></button>
    </div>
  </nav>

  <!-- 主內容區塊 (預設隱藏，資料載入後顯示) -->
  <main id="main-content" class="hidden pt-14">
    
    <!-- 2. 今日人物主視覺 (Hero Profile) -->
    <section class="relative w-full aspect-[4/5] bg-gray-900">
      <!-- 圖片佔位符，將被 JS 替換 -->
      <img id="artist-photo" src="" alt="Artist Photo" class="w-full h-full object-cover object-center">
      <div class="absolute inset-0 hero-gradient flex flex-col justify-end px-5 pb-6">
        <h2 id="artist-nickname" class="text-vintageGold italic text-sm tracking-widest mb-1"></h2>
        <h1 id="artist-name" class="font-serif text-4xl font-semibold text-white mb-1 leading-tight"></h1>
        <p id="artist-lifespan" class="text-gray-400 text-xs tracking-wider"></p>
      </div>
    </section>

    <!-- 介紹專欄與影音區 -->
    <section class="px-5 py-6">
      <p id="artist-bio" class="text-gray-300 text-sm leading-relaxed mb-6 font-light"></p>
      
      <!-- 影音播放器 (16:9 比例) -->
      <div class="w-full aspect-video bg-black rounded-lg overflow-hidden mb-6 border border-gray-800 shadow-lg">
        <iframe id="artist-video" class="w-full h-full" src="" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>

      <!-- 簽到按鈕 -->
      <button id="checkin-btn" class="w-full bg-transparent border border-vintageGold text-vintageGold py-3 rounded-md font-medium tracking-wide flex items-center justify-center gap-2 hover:bg-vintageGold hover:text-carbon transition active:scale-95">
        <span class="material-symbols-outlined text-xl">favorite</span>
        加入我的舞者圖鑑
      </button>
    </section>

    <!-- 分隔線 -->
    <div class="h-px bg-gray-800 w-10/12 mx-auto my-4"></div>

    <!-- 3. 社群熱門問答 -->
    <section class="px-5 py-6 mb-8">
      <h3 class="text-vintageGold text-sm tracking-widest uppercase mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-base">forum</span> 舞者們都在問...
      </h3>
      <div id="qa-container" class="space-y-4">
        <p id="no-qa-hint" class="text-gray-500 text-xs italic text-center py-4 hidden">成為第一個向歷史學家提問的舞者吧！</p>
      </div>
    </section>
  </main>

  <!-- 4. 你的探索對話框 (固定底部) -->
  <div class="fixed bottom-0 w-full bg-cardBg border-t border-gray-800 px-4 py-3 z-40 pb-6">
    <!-- 用戶狀態 (提示還剩幾次問題) -->
    <div id="chat-status" class="text-xs text-gray-500 mb-2 flex justify-between">
      <span>向 AI 歷史學家提問...</span>
      <span class="text-vintageGold">今日剩餘: 5/5</span>
    </div>
    <div class="flex gap-2">
      <input type="text" id="chat-input" placeholder="想問關於他的什麼事？" class="flex-1 bg-carbon text-gray-200 text-sm rounded-full px-4 py-2 border border-gray-700 focus:outline-none focus:border-vintageGold placeholder-gray-600">
      <button id="send-btn" class="bg-vintageGold text-carbon w-10 h-10 rounded-full flex items-center justify-center hover:bg-yellow-500 transition active:scale-90">
        <span class="material-symbols-outlined text-lg ml-1">send</span>
      </button>
    </div>
  </div>

  <!-- JavaScript：前端邏輯與 GAS 串接 -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      google.script.run
        .withSuccessHandler(onDataLoaded)
        .withFailureHandler(onError)
        .getTodayArtist();
    });

    function onDataLoaded(artist) {
      if (artist.error) {
        alert(artist.error);
        return;
      }
      currentArtistId = artist.artistId;
      
      document.getElementById("artist-name").textContent = artist.fullName;
      document.getElementById("artist-nickname").textContent = artist.nickname;
      document.getElementById("artist-lifespan").textContent = artist.lifespan;
      document.getElementById("artist-bio").textContent = artist.introduction;
      document.getElementById("artist-photo").src = artist.photoUrl || 'https://images.unsplash.com/photo-1511192336575-5a79af67a629?q=80&w=1000';
      
      if (artist.mediaLink && artist.mediaLink.includes("http")) {
         document.getElementById("artist-video").src = artist.mediaLink;
      } else {
         document.getElementById("artist-video").src = "https://www.youtube.com/embed/dQw4w9WgXcQ";
      }

      document.getElementById("chat-input").placeholder = `想問關於 ${artist.fullName.split(' ')[0]} 的什麼事？`;

      // 【模組二新增】：當人物資料載入成功後，立刻去撈取前 3 名熱門問答
      loadTopQuestions(currentArtistId);

      document.getElementById("loading-screen").classList.add("hidden");
      document.getElementById("main-content").classList.remove("hidden");
    }

    function onError(error) {
      console.error("載入資料失敗：", error);
      alert("連線資料庫失敗，請重整網頁。");
    }

    // 【模組二函數】：呼叫後端取得前三名問答
    function loadTopQuestions(artistId) {
      google.script.run
        .withSuccessHandler(renderQuestions)
        .getTopQnA(artistId);
    }

    // 【模組二函數】：渲染問答卡片到畫面上
    function renderQuestions(qnaList) {
      const container = document.getElementById("qa-container");
      // 移除除了提示字以外的所有卡片（避免重複渲染）
      const hint = document.getElementById("no-qa-hint");
      container.innerHTML = "";
      container.appendChild(hint);

      if (!qnaList || qnaList.length === 0) {
        hint.classList.remove("hidden");
        return;
      }
      hint.classList.add("hidden");

      qnaList.forEach(item => {
        const card = createQACard(item.qaId, item.question, item.aiAnswer, item.likesCount, false);
        container.appendChild(card);
      });
    }

    // 【模組二功能元件】：動態建立問答卡片的 DOM 物件
    function createQACard(qaId, question, answer, likesCount, isNew = false) {
      const card = document.createElement("div");
      // 如果是剛出爐的新卡片，給予金框與動畫，舊卡片則維持一般灰框
      card.className = isNew 
        ? "bg-cardBg p-4 rounded-lg border border-vintageGold shadow-sm mb-4 transition-all duration-500"
        : "bg-cardBg p-4 rounded-lg border border-gray-800 shadow-sm mb-4";
      
      card.innerHTML = `
        <p class="text-gray-200 text-sm font-medium mb-2 border-l-2 border-vintageGold pl-2">${question}</p>
        <p class="text-gray-400 text-xs leading-relaxed mb-3">${answer}</p>
        <button id="like-btn-${qaId}" class="flex items-center gap-1 text-gray-500 hover:text-vintageGold transition text-xs" onclick="handleLike('${qaId}')">
          <span class="material-symbols-outlined text-sm">thumb_up</span> 
          <span id="like-count-${qaId}" class="font-mono">${likesCount}</span>
        </button>
      `;
      return card;
    }

    // 【模組二功能】：處理使用者按讚與收回讚
    function handleLike(qaId) {
      // 若回傳的是系統錯誤卡片，不允許按讚
      if (qaId === "error") return; 

      const btn = document.getElementById(`like-btn-${qaId}`);
      const countSpan = document.getElementById(`like-count-${qaId}`);
      let currentLikes = parseInt(countSpan.textContent, 10);
      
      let action = "like";
      
      // 1. 前端 UI 先行更新：判斷目前按鈕是否為金色 (已按過讚)
      if (btn.classList.contains("text-vintageGold")) {
        // 如果是金色 -> 執行「收回讚」
        action = "unlike";
        countSpan.textContent = Math.max(0, currentLikes - 1);
        btn.classList.remove("text-vintageGold", "scale-110");
        btn.classList.add("text-gray-500");
      } else {
        // 如果是灰色 -> 執行「按讚」
        action = "like";
        countSpan.textContent = currentLikes + 1;
        btn.classList.remove("text-gray-500");
        btn.classList.add("text-vintageGold", "scale-110");
      }
      
      // 2. 同步傳送給後端 GAS，並帶上 action 指令 ("like" 或 "unlike")
      google.script.run
        .withSuccessHandler(function(result) {
          if (!result.success) {
            console.error("後端按讚更新失敗：", result.error);
            // 失敗的話悄悄校正回真正的數值與狀態
            countSpan.textContent = currentLikes;
            if (action === "like") {
              btn.classList.remove("text-vintageGold", "scale-110");
              btn.classList.add("text-gray-500");
            } else {
              btn.classList.remove("text-gray-500");
              btn.classList.add("text-vintageGold", "scale-110");
            }
          }
        })
        .withFailureHandler(function(err) {
          console.error("按讚連線錯誤：", err);
        })
        .updateLikeCount(qaId, action);
    }

    // --- 調整後的 Gemini API 呼叫與卡片插入邏輯 ---
    document.getElementById("send-btn").addEventListener("click", () => {
      const inputField = document.getElementById("chat-input");
      const question = inputField.value.trim();
      if (!question || !currentArtistId) return;

      const sendBtn = document.getElementById("send-btn");

      inputField.value = "";
      inputField.placeholder = "歷史學家思考中...";
      inputField.disabled = true;
      sendBtn.disabled = true;
      sendBtn.classList.add("opacity-50");

      google.script.run
        .withSuccessHandler(function(result) {
          inputField.disabled = false;
          sendBtn.disabled = false;
          sendBtn.classList.remove("opacity-50");
          inputField.placeholder = `想問關於他的什麼事？`;

          // 如果後端回傳錯誤
          if (result.error) {
            alert(result.error);
            return;
          }

          // 隱藏「成為第一個提問」的提示字
          document.getElementById("no-qa-hint").classList.add("hidden");

          // 動態生成新卡片並放到最上方（帶有從後端拿到的真實 qaId 才能按讚）
          const qaContainer = document.getElementById("qa-container");
          const newCard = createQACard(result.qaId, question, result.answer, 0, true);
          
          qaContainer.insertBefore(newCard, qaContainer.firstChild);
        })
        .withFailureHandler(function(error) {
          alert("發生錯誤：" + error);
          inputField.disabled = false;
          sendBtn.disabled = false;
          sendBtn.classList.remove("opacity-50");
        })
        .askHistorian(currentArtistId, question);
    });
  </script>
</body>
</html>
